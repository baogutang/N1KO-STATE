<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400" />
  <title>N1KO STATE — Gauge Popover Demo v3.2</title>
  <style>
    :root {
      --accent: #5E5CE6;
      --ok: #32D74B;
      --info: #0A84FF;
      --warn: #FF9F0A;
      --danger: #FF453A;
      --gpu: #FF6482;

      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --card: rgba(255, 255, 255, 0.78);
      --header: rgba(255, 255, 255, 0.9);
      --stroke: rgba(0, 0, 0, 0.06);
      --track: rgba(0, 0, 0, 0.055);
      --text: rgba(0, 0, 0, 0.88);
      --text-2: rgba(0, 0, 0, 0.50);
      --text-3: rgba(0, 0, 0, 0.34);
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 10px 28px rgba(0,0,0,0.07);
      --blur: blur(20px) saturate(180%);
      --spring: cubic-bezier(0.22, 1.12, 0.36, 1);
    }

    [data-theme="dark"] {
      --bg: #0E0F12;
      --surface: #14161C;
      --card: rgba(28, 30, 38, 0.68);
      --header: rgba(22, 24, 30, 0.94);
      --stroke: rgba(255, 255, 255, 0.07);
      --track: rgba(255, 255, 255, 0.085);
      --text: rgba(255, 255, 255, 0.92);
      --text-2: rgba(255, 255, 255, 0.54);
      --text-3: rgba(255, 255, 255, 0.36);
      --shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 14px 44px rgba(0,0,0,0.48);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }

    .page-header {
      width: min(720px, 100%);
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .page-header p {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.55;
      max-width: 54ch;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .controls button {
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--stroke);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s var(--spring);
    }

    .controls button:hover { background: var(--card); }
    .controls button.active {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }

    .stage {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .popover {
      width: 360px;
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .popover-header {
      padding: 12px 14px 10px;
      background: var(--header);
      border-bottom: 1px solid var(--stroke);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.03em;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", system-ui, sans-serif;
    }

    .brand .accent { color: var(--accent); }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 2px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 7px;
      color: var(--text-2);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 13px;
    }

    .icon-btn:hover {
      background: var(--track);
      color: var(--text);
    }

    .summary-strip {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }

    .summary-item {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .summary-item .label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .summary-item .value {
      font-size: 11px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      display: inline-block;
      transition: transform 0.38s var(--spring), opacity 0.28s ease;
    }

    .summary-item .value.bump {
      animation: valueBump 0.42s var(--spring);
    }

    @keyframes valueBump {
      0%   { transform: scale(1); opacity: 1; }
      35%  { transform: scale(1.08); opacity: 0.72; }
      100% { transform: scale(1); opacity: 1; }
    }

    .summary-item .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      align-self: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 14px 14px;
    }

    .tile {
      --tile-accent: var(--accent);
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 12px;
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 158px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(8px) scale(0.98);
      animation: tileIn 0.62s var(--spring) forwards;
      animation-delay: calc(var(--i, 0) * 0.045s);
    }

    @keyframes tileIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .tile-head {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .tile-icon {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      display: grid;
      place-items: center;
      font-size: 10px;
      background: color-mix(in srgb, var(--tile-accent) 11%, transparent);
      color: var(--tile-accent);
    }

    .tile-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .tile-status {
      margin-left: auto;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ok);
    }

    .ring-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2px 0;
    }

    .ring {
      --size: 100px;
      --lw: 5px;
      width: var(--size);
      height: var(--size);
      position: relative;
    }

    .ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      will-change: transform;
    }

    .ring-track {
      fill: none;
      stroke: var(--track);
      stroke-width: var(--lw);
    }

    .ring-arc {
      fill: none;
      stroke: var(--tile-accent);
      stroke-width: var(--lw);
      stroke-linecap: round;
      will-change: stroke-dashoffset;
    }

    /* All info lives inside the ring — inset keeps text clear of the arc */
    .ring-center {
      position: absolute;
      inset: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 3px;
      pointer-events: none;
    }

    .ring-primary {
      font-size: 14px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--tile-accent);
      transition: color 0.3s ease;
    }

    .ring-primary.bump {
      animation: primaryBump 0.48s var(--spring);
    }

    @keyframes primaryBump {
      0%   { transform: scale(1); filter: brightness(1); }
      40%  { transform: scale(1.06); filter: brightness(1.12); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    .ring-details {
      display: flex;
      flex-direction: column;
      gap: 1px;
      width: 100%;
      max-width: 72px;
    }

    .ring-detail {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 3px;
      font-size: 7px;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.32s ease, transform 0.38s var(--spring);
    }

    .ring-detail .d-label {
      color: var(--text-3);
      font-weight: 500;
      flex-shrink: 0;
    }

    .ring-detail .d-value {
      color: var(--text-2);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .ring-detail.updating {
      opacity: 0.45;
      transform: translateY(1px);
    }

    .notes {
      width: min(300px, 100%);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: var(--surface);
    }

    .notes h2 {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .notes ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notes li {
      font-size: 11px;
      color: var(--text-2);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }

    .notes li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
    }

    .notes .tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      color: var(--accent);
      margin-right: 4px;
    }

    @media (max-width: 720px) {
      .notes { width: 360px; }
    }
  </style>
</head>
<body data-theme="light">
  <div class="page-header">
    <h1>Gauge Popover — UI Demo v3.2</h1>
    <p>恢复完整可读标签（负载、核心、已用…），只压缩数值格式；环径 100px + 标签/数值分色，兼顾语义和留白。</p>
    <div class="controls">
      <button id="btn-light" class="active" onclick="setTheme('light')">浅色</button>
      <button id="btn-dark" onclick="setTheme('dark')">深色</button>
      <button id="btn-animate" onclick="toggleAnimate()">模拟数据刷新</button>
    </div>
  </div>

  <div class="stage">
    <div class="popover">
      <header class="popover-header">
        <div class="brand-row">
          <div class="brand">N1KO <span class="accent">STATE</span></div>
          <div class="header-actions">
            <button class="icon-btn" title="设置">⚙</button>
            <button class="icon-btn" title="退出">⏻</button>
          </div>
        </div>
        <div class="summary-strip" id="summary"></div>
      </header>
      <div class="grid" id="grid"></div>
    </div>

    <aside class="notes">
      <h2>v3.2 调整</h2>
      <ul>
        <li><span class="tag">标签</span>恢复完整词：负载、核心、已用、下载…</li>
        <li><span class="tag">数值</span>只压缩值：13.7G、1d14h、1001rpm</li>
        <li><span class="tag">排版</span>标签灰色 + 数值深色分开展示</li>
        <li><span class="tag">环径</span>100px，inset 18px，不压弧线</li>
      </ul>
    </aside>
  </div>

  <script>
    const RING_R = 42;
    const CIRC = 2 * Math.PI * RING_R;

    /* Spring matching SwiftUI: response≈0.52, damping≈0.84 */
    class Spring1D {
      constructor(initial = 0, stiffness = 210, damping = 26) {
        this.value = initial;
        this.velocity = 0;
        this.target = initial;
        this.stiffness = stiffness;
        this.damping = damping;
      }
      set(v) { this.target = v; }
      step(dt) {
        const force = -this.stiffness * (this.value - this.target);
        const damp = -this.damping * this.velocity;
        this.velocity += (force + damp) * dt;
        this.value += this.velocity * dt;
        if (Math.abs(this.value - this.target) < 0.0004 && Math.abs(this.velocity) < 0.0004) {
          this.value = this.target;
          this.velocity = 0;
          return true;
        }
        return false;
      }
    }

    const tiles = [
      { id: 'cpu', title: 'CPU', icon: '◉', accent: 'var(--info)', fraction: 0.24, value: '24%',
        details: [['负载', '4.08'], ['核心', '10'], ['运行', '1d14h']] },
      { id: 'gpu', title: 'GPU', icon: '✦', accent: 'var(--gpu)', fraction: 0.78, value: '78%',
        details: [['显存', '1.3G'], ['芯片', 'M4']] },
      { id: 'memory', title: '内存', icon: '▣', accent: 'var(--warn)', fraction: 0.85, value: '85%',
        details: [['已用', '13.7G'], ['空闲', '2.3G'], ['压力', '中']] },
      { id: 'disk', title: '磁盘', icon: '◧', accent: 'var(--accent)', fraction: 0.62, value: '62%',
        details: [['空闲', '87G'], ['读取', '3.6M'], ['写入', '3.9M']] },
      { id: 'network', title: '网络', icon: '⇅', accent: 'var(--info)', fraction: 0.35, value: '606K', online: true,
        details: [['下载', '606K'], ['上传', '458K'], ['IP', '10.1.30.2']] },
      { id: 'sensors', title: '传感器', icon: '°', accent: 'var(--info)', fraction: 0.47, value: '52°',
        details: [['峰值', '52°'], ['风扇', '1'], ['转速', '1001rpm']] }
    ];

    const springs = new Map();
    let lastFrame = performance.now();
    let rafId = null;
    let animTimer = null;

    function padDetails(details) {
      const rows = details.filter(([k, v]) => k || v);
      while (rows.length < 3) rows.push(['', '']);
      return rows.slice(0, 3);
    }

    function detailHTML([k, v]) {
      if (!k && !v) return '<span class="d-label">\u00A0</span>';
      if (!k) return `<span class="d-value">${v}</span>`;
      if (!v) return `<span class="d-label">${k}</span>`;
      return `<span class="d-label">${k}</span><span class="d-value">${v}</span>`;
    }

    function detailKey([k, v]) {
      return `${k}|${v}`;
    }

    function buildTile(t, i) {
      const rows = padDetails(t.details);
      return `
        <article class="tile" style="--tile-accent:${t.accent};--i:${i}" data-id="${t.id}">
          <div class="tile-head">
            <div class="tile-icon">${t.icon}</div>
            <div class="tile-title">${t.title}</div>
            ${t.online ? '<div class="tile-status"></div>' : ''}
          </div>
          <div class="ring-wrap">
            <div class="ring">
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <circle class="ring-track" cx="50" cy="50" r="${RING_R}"/>
                <circle class="ring-arc" cx="50" cy="50" r="${RING_R}"
                  stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}"/>
              </svg>
              <div class="ring-center">
                <div class="ring-primary">${t.value}</div>
                <div class="ring-details">
                  ${rows.map((row, ri) =>
                    `<div class="ring-detail" data-ri="${ri}" data-key="${detailKey(row)}">${detailHTML(row)}</div>`
                  ).join('')}
                </div>
              </div>
            </div>
          </div>
        </article>`;
    }

    function initSprings() {
      tiles.forEach(t => {
        const s = new Spring1D(0, 200, 24);
        s.set(t.fraction);
        springs.set(t.id, s);
      });
    }

    function mount() {
      document.getElementById('summary').innerHTML = `
        <div class="summary-item">
          <span class="dot" style="background:var(--info)"></span>
          <span class="label">CPU</span>
          <span class="value" id="sum-cpu">${tiles[0].value}</span>
        </div>
        <div class="summary-item">
          <span class="dot" style="background:var(--warn)"></span>
          <span class="label">内存</span>
          <span class="value" id="sum-mem">${tiles[2].value}</span>
        </div>
        <div class="summary-item">
          <span class="dot" style="background:var(--info)"></span>
          <span class="label">网络</span>
          <span class="value" id="sum-net">${tiles[4].value}</span>
        </div>`;

      document.getElementById('grid').innerHTML = tiles.map(buildTile).join('');
      initSprings();

      // Entrance: spring arcs from 0
      tiles.forEach(t => {
        const s = springs.get(t.id);
        s.value = 0;
        s.velocity = 0;
        s.set(t.fraction);
      });

      startLoop();
    }

    function arcOffset(fraction) {
      const f = Math.min(Math.max(fraction, 0), 1);
      return CIRC * (1 - f);
    }

    function tickFrame(now) {
      const dt = Math.min((now - lastFrame) / 1000, 0.032);
      lastFrame = now;
      let allSettled = true;

      tiles.forEach(t => {
        const spring = springs.get(t.id);
        if (!spring.step(dt)) allSettled = false;

        const tile = document.querySelector(`[data-id="${t.id}"]`);
        if (!tile) return;
        const arc = tile.querySelector('.ring-arc');
        arc.style.strokeDashoffset = arcOffset(spring.value);
      });

      rafId = requestAnimationFrame(tickFrame);
    }

    function startLoop() {
      if (rafId) cancelAnimationFrame(rafId);
      lastFrame = performance.now();
      rafId = requestAnimationFrame(tickFrame);
    }

    function bump(el) {
      if (!el) return;
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
    }

    function updateTile(t) {
      const tile = document.querySelector(`[data-id="${t.id}"]`);
      if (!tile) return;

      springs.get(t.id).set(t.fraction);

      const primary = tile.querySelector('.ring-primary');
      if (primary.textContent !== t.value) {
        primary.textContent = t.value;
        bump(primary);
      }

      const rows = padDetails(t.details);
      tile.querySelectorAll('.ring-detail').forEach((el, i) => {
        const row = rows[i];
        const key = detailKey(row);
        if (el.dataset.key !== key) {
          el.classList.add('updating');
          setTimeout(() => {
            el.dataset.key = key;
            el.innerHTML = detailHTML(row);
            el.classList.remove('updating');
          }, 80);
        }
      });
    }

    function updateSummary(id, value) {
      const el = document.getElementById(id);
      if (el && el.textContent !== value) {
        el.textContent = value;
        bump(el);
      }
    }

    function randomize() {
      const cpu = tiles[0];
      cpu.fraction = 0.10 + Math.random() * 0.65;
      cpu.value = Math.round(cpu.fraction * 100) + '%';
      cpu.details[0][1] = (2 + Math.random() * 6).toFixed(1);

      const gpu = tiles[1];
      gpu.fraction = 0.4 + Math.random() * 0.55;
      gpu.value = Math.round(gpu.fraction * 100) + '%';

      const mem = tiles[2];
      mem.fraction = 0.68 + Math.random() * 0.28;
      mem.value = Math.round(mem.fraction * 100) + '%';

      const disk = tiles[3];
      disk.fraction = 0.45 + Math.random() * 0.4;
      disk.value = Math.round(disk.fraction * 100) + '%';

      const net = tiles[4];
      const rate = Math.round(180 + Math.random() * 1200);
      net.value = rate >= 1000 ? (rate / 1000).toFixed(1) + 'M' : rate + 'K';
      net.fraction = Math.min(rate / 2500, 1);
      const up = Math.round(150 + Math.random() * 650);
      net.details[0][1] = net.value;
      net.details[1][1] = up >= 1000 ? (up / 1000).toFixed(1) + 'M' : up + 'K';

      const temp = tiles[5];
      const t = Math.round(40 + Math.random() * 22);
      temp.value = t + '°';
      temp.fraction = t / 110;
      temp.details[0][1] = temp.value;
      temp.details[2][1] = Math.round(800 + Math.random() * 400) + 'rpm';

      tiles.forEach(updateTile);
      updateSummary('sum-cpu', cpu.value);
      updateSummary('sum-mem', mem.value);
      updateSummary('sum-net', net.value);
    }

    function setTheme(t) {
      document.body.dataset.theme = t;
      document.getElementById('btn-light').classList.toggle('active', t === 'light');
      document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
    }

    function toggleAnimate() {
      const btn = document.getElementById('btn-animate');
      if (animTimer) {
        clearInterval(animTimer);
        animTimer = null;
        btn.classList.remove('active');
        btn.textContent = '模拟数据刷新';
        return;
      }
      btn.classList.add('active');
      btn.textContent = '停止刷新';
      randomize();
      animTimer = setInterval(randomize, 900);
    }

    mount();
  </script>
</body>
</html>
