name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal DMG
        run: ./build_app.sh --dmg

      - name: Verify DMG
        run: |
          test -f build/N1KO-STATE.dmg
          hdiutil verify build/N1KO-STATE.dmg
          lipo -archs build/N1KO-STATE.app/Contents/MacOS/N1KOState | tr ' ' '\n' | sort | uniq -c

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "::error::Missing SPARKLE_PRIVATE_KEY repository secret"
            exit 1
          fi
          mkdir -p build/sparkle
          ditto -c -k --norsrc --noextattr --keepParent build/N1KO-STATE.app build/N1KO-STATE-sparkle.zip
          cp build/N1KO-STATE-sparkle.zip build/sparkle/N1KO-STATE-sparkle.zip
          TAG="${GITHUB_REF_NAME#v}"
          NOTES=".github/release-notes/v${TAG}.md"
          cp "$NOTES" build/sparkle/N1KO-STATE-sparkle.md
          if [[ -f appcast.xml ]]; then
            cp appcast.xml build/sparkle/appcast.xml
          fi
          printf '%s' "$SPARKLE_PRIVATE_KEY" | \
            .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
              --ed-key-file - \
              --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" \
              --embed-release-notes \
              --disable-signing-warning \
              -o build/appcast.xml \
              build/sparkle
          test -f build/appcast.xml
          cp build/appcast.xml /tmp/release-appcast.xml

      - name: Publish appcast to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cp /tmp/release-appcast.xml appcast.xml
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Publish appcast for ${{ github.ref_name }} [skip ci]"
          git push origin main

      - name: Resolve release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NOTES=".github/release-notes/v${TAG}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "::error::Missing release notes file: $NOTES"
            exit 1
          fi
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: N1KO-STATE ${{ github.ref_name }}
          files: |
            build/N1KO-STATE.dmg
            build/N1KO-STATE-sparkle.zip
            build/appcast.xml
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
